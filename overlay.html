<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCL Score Bar Overlay</title>
  <style>
    :root {
      --ucl-blue: #1d1fb8;
      --ucl-blue-dark: #12147a;
      --ucl-white: #ffffff;
      --ucl-text: #eef1ff;
      --ucl-red: #ff3148;
      --shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    #overlay {
      position: fixed;
      top: 34px;
      right: 34px;
      display: flex;
      align-items: stretch;
      height: 52px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .clock-wrap {
      display: flex;
      align-items: stretch;
      background: var(--ucl-white);
      color: #16204f;
      min-width: 154px;
      border-right: 6px solid #0e124c;
    }

    .ucl-logo {
      width: 48px;
      background: #2640d2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .ucl-logo img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .clock-box {
      min-width: 106px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .main-bar {
      display: grid;
      grid-template-columns: 110px 22px 56px 56px 22px 110px 10px;
      height: 52px;
      background: linear-gradient(90deg, var(--ucl-blue-dark), #1f1fcb 38%, #191aa7 100%);
      color: var(--ucl-text);
      align-items: center;
      min-width: 386px;
    }

    .team,
    .score,
    .sep,
    .spacer {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .team {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .score {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .sep {
      color: rgba(255, 255, 255, 0.22);
      font-size: 28px;
      font-weight: 300;
    }

    .spacer {
      border-left: 4px solid var(--ucl-red);
      width: 10px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="clock-wrap">
      <div class="ucl-logo">
        <img id="competitionLogo" alt="Competition logo" src="https://a.espncdn.com/i/leaguelogos/soccer/500/2.png" />
      </div>
      <div class="clock-box" id="timeBox">00:00</div>
    </div>

    <div class="main-bar">
      <div class="team" id="homeAbbr">ATM</div>
      <div class="sep">›</div>
      <div class="score" id="homeScore">0</div>
      <div class="score" id="awayScore">0</div>
      <div class="sep">‹</div>
      <div class="team" id="awayAbbr">BAR</div>
      <div class="spacer"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const LEAGUE = params.get('league') || 'uefa.champions';
    const HOME_ABBR = (params.get('home') || 'ATM').toUpperCase();
    const AWAY_ABBR = (params.get('away') || 'BAR').toUpperCase();

    const SCOREBOARD_URL = `https://site.api.espn.com/apis/site/v2/sports/soccer/${LEAGUE}/scoreboard`;

    const competitionLogo = document.getElementById('competitionLogo');
    const timeBox = document.getElementById('timeBox');
    const homeAbbrEl = document.getElementById('homeAbbr');
    const awayAbbrEl = document.getElementById('awayAbbr');
    const homeScoreEl = document.getElementById('homeScore');
    const awayScoreEl = document.getElementById('awayScore');

    let latest = null;

    function parseClockToSeconds(value) {
      const text = String(value || '').trim();
      const match = text.match(/^(\d{1,3}):(\d{2})$/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function formatSeconds(total) {
      const minutes = Math.max(0, Math.floor(total / 60));
      const seconds = Math.max(0, total % 60);
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function clockToMinute(clock) {
      const raw = String(clock || '').trim();

      if (!raw) return '00:00';
      if (raw === 'HT') return 'HT';
      if (raw === 'FT') return 'FT';

      const injury = raw.match(/^(\d{1,3})'?\+(\d{1,2})'?$/);
      if (injury) return `${injury[1]}+${injury[2]}`;

      const minuteOnly = raw.match(/^(\d{1,3})'?$/);
      if (minuteOnly) return `${minuteOnly[1]}:00`;

      const mmss = raw.match(/^(\d{1,3}):(\d{2})$/);
      if (mmss) return `${mmss[1]}:${mmss[2]}`;

      return raw;
    }

    function isRunning(statusType = {}, status = {}) {
      const state = String(statusType.state || '').toLowerCase();
      const description = String(statusType.description || '').toLowerCase();
      const detail = String(statusType.detail || '').toLowerCase();
      const shortDetail = String(statusType.shortDetail || '').toLowerCase();
      const completed = Boolean(statusType.completed);
      const displayClock = String(status.displayClock || '').trim().toUpperCase();

      if (completed) return false;
      if (state === 'pre') return false;
      if (displayClock === 'HT' || displayClock === 'FT') return false;

      if (
        description.includes('half-time') ||
        description.includes('halftime') ||
        detail.includes('half-time') ||
        detail.includes('halftime') ||
        shortDetail.includes('half-time') ||
        shortDetail.includes('halftime')
      ) {
        return false;
      }

      if (state === 'in') return true;
      if (description.includes('first half') || description.includes('second half')) return true;
      if (detail.includes('first half') || detail.includes('second half')) return true;
      if (shortDetail.includes('first half') || shortDetail.includes('second half')) return true;

      return false;
    }

    function pickFixture(events = []) {
      return events.find((event) => {
        const competitors = event?.competitions?.[0]?.competitors || [];
        const abbrs = competitors.map((c) => (c?.team?.abbreviation || '').toUpperCase());
        return abbrs.includes(HOME_ABBR) && abbrs.includes(AWAY_ABBR);
      });
    }

    function getDisplayedClock(data) {
      if (!data) return '00:00';

      const statusText = String(data.status || '').toUpperCase();

      if (statusText.includes('FULL TIME') || statusText === 'FT') return 'FT';
      if (statusText.includes('HALF TIME') || statusText === 'HT') return 'HT';

      if (String(data.minute || '').includes('+')) return data.minute;

      const base = parseClockToSeconds(data.minute);
      if (base == null) return data.minute || '00:00';

      if (!data.running || !data.fetchedAtISO) {
        return formatSeconds(base);
      }

      const fetchedAt = new Date(data.fetchedAtISO).getTime();
      if (Number.isNaN(fetchedAt)) {
        return formatSeconds(base);
      }

      const elapsed = Math.max(0, Math.floor((Date.now() - fetchedAt) / 1000));
      return formatSeconds(base + elapsed);
    }

    function paint() {
      if (!latest) return;

      timeBox.textContent = getDisplayedClock(latest);
      homeAbbrEl.textContent = latest.homeAbbr;
      awayAbbrEl.textContent = latest.awayAbbr;
      homeScoreEl.textContent = latest.homeScore;
      awayScoreEl.textContent = latest.awayScore;

      if (latest.competitionLogo) {
        competitionLogo.src = latest.competitionLogo;
      }
    }

    async function refresh() {
      const response = await fetch(`${SCOREBOARD_URL}?t=${Date.now()}`, {
        cache: 'no-store'
      });

      if (!response.ok) return;

      const data = await response.json();
      const fixture = pickFixture(data.events || []);
      if (!fixture) return;

      const comp = fixture.competitions?.[0];
      if (!comp) return;

      const home = comp.competitors.find((c) => c.homeAway === 'home');
      const away = comp.competitors.find((c) => c.homeAway === 'away');
      if (!home || !away) return;

      const status = comp.status || {};
      const statusType = status.type || {};
      const displayClock = status.displayClock || "0'";
      const leagueLogo =
        fixture?.league?.logos?.[0]?.href ||
        'https://a.espncdn.com/i/leaguelogos/soccer/500/2.png';

      const clockSeconds = Number(status.clock || 0);

      const incomingMinute =
        clockSeconds > 0
          ? formatSeconds(clockSeconds)
          : clockToMinute(displayClock);

      const incoming = {
        homeAbbr: home.team.abbreviation || HOME_ABBR,
        awayAbbr: away.team.abbreviation || AWAY_ABBR,
        homeScore: Number(home.score || 0),
        awayScore: Number(away.score || 0),
        minute: incomingMinute,
        status: statusType.description || statusType.shortDetail || '',
        running: isRunning(statusType, status),
        fetchedAtISO: new Date().toISOString(),
        competitionLogo: leagueLogo
      };

      if (!latest) {
        latest = incoming;
        paint();
        return;
      }

      const currentDisplayed = getDisplayedClock(latest);
      const currentSecs = parseClockToSeconds(currentDisplayed) ?? 0;
      const incomingSecs = parseClockToSeconds(incoming.minute) ?? 0;

      if (incoming.minute === 'HT' || incoming.minute === 'FT' || incoming.minute.includes('+')) {
        latest = incoming;
      } else if (incomingSecs >= currentSecs) {
        latest = incoming;
      } else {
        latest = {
          ...incoming,
          minute: latest.minute,
          fetchedAtISO: latest.fetchedAtISO
        };
      }

      paint();
    }

    refresh();
    setInterval(refresh, 3000);
    setInterval(paint, 1000);
  </script>
</body>
</html>
