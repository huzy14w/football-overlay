<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Liga Score Bug Overlay</title>
  <style>
    :root {
      --red: #ff5248;
      --navy: #04061a;
      --navy-2: #0b1030;
      --white: #ffffff;
      --text: #0c0c0f;
      --shadow: 0 10px 26px rgba(0,0,0,0.28);
      --border: rgba(0,0,0,0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    #overlay {
      position: fixed;
      top: 26px;
      right: 26px;
      width: 402px;
      display: flex;
      align-items: stretch;
      box-shadow: var(--shadow);
      transform-origin: top right;
    }

    .clock-panel {
      width: 132px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-right: 0;
    }

    .brand {
      height: 78px;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 54px;
      font-weight: 1000;
      letter-spacing: -0.08em;
      line-height: 1;
      user-select: none;
    }

    .brand span {
      transform: skew(-10deg);
      display: inline-block;
    }

    .time-box,
    .extra-box {
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-weight: 1000;
      border-top: 1px solid var(--border);
    }

    .time-box {
      height: 74px;
      font-size: 38px;
      letter-spacing: -0.05em;
    }

    .extra-box {
      height: 42px;
      font-size: 28px;
      background: var(--red);
      color: var(--white);
      display: none;
    }

    #overlay.has-extra .time-box {
      height: 54px;
    }

    #overlay.has-extra .extra-box {
      display: flex;
    }

    .teams-panel {
      width: 110px;
      background: linear-gradient(180deg, var(--navy), #000514 58%, var(--navy-2));
      display: grid;
      grid-template-rows: 1fr 1fr;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .teams-panel::before,
    .teams-panel::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 0;
    }

    .teams-panel::before {
      right: 0;
      width: 6px;
      background: linear-gradient(180deg, #1e5cff 0 50%, #d62134 50% 100%);
    }

    .teams-panel::after {
      left: 0;
      width: 2px;
      background: rgba(255,255,255,0.06);
    }

    .team-row {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .team-row + .team-row {
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .logo-wrap {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      max-width: 46px;
      max-height: 46px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.28));
    }

    .abbr {
      position: absolute;
      left: 9px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.03em;
      color: rgba(255,255,255,0.92);
    }

    .scores-panel {
      width: 160px;
      display: grid;
      grid-template-rows: 1fr 1fr;
      border: 1px solid var(--border);
      border-left: 0;
      background: #f5f5f5;
    }

    .score-box {
      position: relative;
      background: var(--white);
      color: #090a10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 68px;
      font-weight: 1000;
      line-height: 1;
      letter-spacing: -0.08em;
    }

    .score-box + .score-box {
      border-top: 1px solid var(--border);
    }

    .score-box::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(0,0,0,0.04));
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="clock-panel">
      <div class="brand"><span>4</span></div>
      <div class="time-box" id="timeBox">00:00</div>
      <div class="extra-box" id="extraBox"></div>
    </div>

    <div class="teams-panel">
      <div class="team-row">
        <div class="abbr" id="homeAbbr">RMA</div>
        <div class="logo-wrap"><img id="homeLogo" alt="Home team logo" /></div>
      </div>
      <div class="team-row">
        <div class="abbr" id="awayAbbr">GIR</div>
        <div class="logo-wrap"><img id="awayLogo" alt="Away team logo" /></div>
      </div>
    </div>

    <div class="scores-panel">
      <div class="score-box" id="homeScore">0</div>
      <div class="score-box" id="awayScore">0</div>
    </div>
  </div>

  <script>
    const SCOREBOARD_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/esp.1/scoreboard';

    const overlay = document.getElementById('overlay');
    const timeBox = document.getElementById('timeBox');
    const extraBox = document.getElementById('extraBox');
    const homeLogo = document.getElementById('homeLogo');
    const awayLogo = document.getElementById('awayLogo');
    const homeScore = document.getElementById('homeScore');
    const awayScore = document.getElementById('awayScore');
    const homeAbbr = document.getElementById('homeAbbr');
    const awayAbbr = document.getElementById('awayAbbr');

    let latest = null;

    function clockToMinute(clock) {
      const raw = String(clock || '').trim();

      if (!raw) return '00:00';
      if (raw === 'HT') return '45:00';
      if (raw === 'FT') return '90:00';

      const injury = raw.match(/^(\d{1,3})\+(\d{1,2})'?$/);
      if (injury) return `${injury[1]}:00`;

      const minuteOnly = raw.match(/^(\d{1,3})'?$/);
      if (minuteOnly) return `${minuteOnly[1]}:00`;

      const mmss = raw.match(/^(\d{1,3}):(\d{2})$/);
      if (mmss) return `${mmss[1]}:${mmss[2]}`;

      return '00:00';
    }

    function extractExtra(clock) {
      const raw = String(clock || '').trim();
      const injury = raw.match(/^(\d{1,3})\+(\d{1,2})'?$/);
      return injury ? `+${injury[2]}` : '';
    }

    function parseClockToSeconds(value) {
      const match = String(value || '').trim().match(/^(\d{1,3}):(\d{2})$/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function formatSeconds(total) {
      const minutes = Math.max(0, Math.floor(total / 60));
      const seconds = Math.max(0, total % 60);
      return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }

    function isRunning(statusType = {}, status = {}) {
      const state = String(statusType.state || '').toLowerCase();
      const name = String(statusType.name || '').toLowerCase();
      const description = String(statusType.description || '').toLowerCase();
      const detail = String(statusType.detail || '').toLowerCase();
      const shortDetail = String(statusType.shortDetail || '').toLowerCase();
      const completed = Boolean(statusType.completed);
      const displayClock = String(status.displayClock || '').trim().toUpperCase();

      if (completed) return false;
      if (state === 'pre') return false;
      if (displayClock === 'HT' || displayClock === 'FT') return false;

      if (
        description.includes('half-time') ||
        description.includes('halftime') ||
        detail.includes('half-time') ||
        detail.includes('halftime') ||
        shortDetail.includes('half-time') ||
        shortDetail.includes('halftime') ||
        name.includes('halftime')
      ) {
        return false;
      }

      if (state === 'in') return true;
      if (description.includes('first half')) return true;
      if (description.includes('second half')) return true;
      if (detail.includes('first half')) return true;
      if (detail.includes('second half')) return true;
      if (shortDetail.includes('first half')) return true;
      if (shortDetail.includes('second half')) return true;

      return false;
    }

    function pickFixture(events = []) {
      return events.find((event) => {
        const competitors = event?.competitions?.[0]?.competitors || [];
        const abbrs = competitors.map(c => c?.team?.abbreviation);
        return abbrs.includes('RMA') && abbrs.includes('GIR');
      });
    }

    function getDisplayedClock(data) {
      if (!data) return '00:00';

      const base = parseClockToSeconds(data.minute);
      if (base == null) return data.minute || '00:00';
      if (!data.running || !data.fetchedAtISO) return formatSeconds(base);

      const fetchedAt = new Date(data.fetchedAtISO).getTime();
      const elapsed = Math.max(0, Math.floor((Date.now() - fetchedAt) / 1000));
      return formatSeconds(base + elapsed);
    }

    function paint() {
      if (!latest) return;

      timeBox.textContent = getDisplayedClock(latest);
      extraBox.textContent = latest.extra || '';
      overlay.classList.toggle('has-extra', !!latest.extra);

      homeLogo.src = latest.homeLogo;
      awayLogo.src = latest.awayLogo;
      homeScore.textContent = latest.homeScore;
      awayScore.textContent = latest.awayScore;
      homeAbbr.textContent = latest.homeAbbr;
      awayAbbr.textContent = latest.awayAbbr;
    }

    async function refresh() {
      const response = await fetch(`${SCOREBOARD_URL}?t=${Date.now()}`, {
        cache: 'no-store'
      });

      const data = await response.json();
      const fixture = pickFixture(data.events || []);
      if (!fixture) return;

      const comp = fixture.competitions[0];
      const home = comp.competitors.find(c => c.homeAway === 'home');
      const away = comp.competitors.find(c => c.homeAway === 'away');
      const status = comp.status || {};
      const statusType = status.type || {};
      const displayClock = status.displayClock || "0'";

      latest = {
        homeName: home.team.displayName,
        awayName: away.team.displayName,
        homeAbbr: home.team.abbreviation,
        awayAbbr: away.team.abbreviation,
        homeScore: Number(home.score || 0),
        awayScore: Number(away.score || 0),
        homeLogo: home.team.logo,
        awayLogo: away.team.logo,
        minute: clockToMinute(displayClock),
        extra: extractExtra(displayClock),
        running: isRunning(statusType, status),
        fetchedAtISO: new Date().toISOString()
      };

      paint();
    }

    refresh();
    setInterval(refresh, 10000);
    setInterval(paint, 1000);
  </script>
</body>
</html>
